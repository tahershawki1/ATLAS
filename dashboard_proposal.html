<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Atlas Dashboard Proposal</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&family=Outfit:wght@400;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #f8fafc;
            --accent-blue: #1e40af; /* Deeper Atlas Logo Blue */
            --accent-soft: rgba(30, 64, 175, 0.08);
            --card-glass: rgba(255, 255, 255, 0.85);
            --card-border: rgba(255, 255, 255, 1);
            --text-main: #1e293b;
            --text-dim: #64748b;
            --nav-bg: rgba(255, 255, 255, 0.95);
            --shadow-soft: 0 12px 30px rgba(30, 64, 175, 0.06);
        }

        @keyframes float {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-15px); }
            100% { transform: translateY(0px); }
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: 'Cairo', 'Outfit', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            background: radial-gradient(circle at top right, #f1f5f9 0%, #e2e8f0 100%);
        }

        /* Decorative Light Blobs */
        .orb {
            position: absolute;
            border-radius: 50%;
            filter: blur(100px);
            z-index: -1;
            opacity: 0.35;
        }
        .orb-1 { top: -80px; left: -80px; width: 450px; height: 450px; background: rgba(30, 64, 175, 0.15); animation: float 10s infinite ease-in-out; }
        .orb-2 { bottom: -80px; right: -80px; width: 500px; height: 500px; background: rgba(30, 64, 175, 0.1); animation: float 12s infinite ease-in-out reverse; }

        /* Header */
        header {
            padding: 50px 20px 30px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .logo-container {
            text-align: center;
        }

        .logo-main {
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .logo-text-atlas {
            font-family: 'Outfit', sans-serif;
            font-size: 2.8rem;
            font-weight: 800;
            letter-spacing: 4px;
            color: var(--accent-blue);
            line-height: 1;
            margin-bottom: 2px;
        }

        .logo-text-site {
            font-family: 'Outfit', sans-serif;
            font-size: 1rem;
            font-weight: 500;
            letter-spacing: 8px;
            color: var(--text-dim);
            text-transform: uppercase;
        }

        /* Main Dashboard Grid */
        main {
            flex: 1;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 25px;
            max-width: 500px;
            margin: 0 auto;
            width: 100%;
            z-index: 1;
        }

        .dashboard-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            grid-template-rows: 1fr 1fr;
            gap: 20px;
            margin-top: 10px;
            flex: 1;
        }

        .dash-card {
            background: var(--card-glass);
            backdrop-filter: blur(12px);
            border: 1px solid var(--card-border);
            border-radius: 32px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 15px;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            cursor: pointer;
            box-shadow: var(--shadow-soft);
            position: relative;
            overflow: hidden;
        }

        .dash-card:hover {
            transform: translateY(-10px);
            background: #ffffff;
            border-color: var(--accent-blue);
            box-shadow: 0 20px 40px rgba(30, 64, 175, 0.1);
        }

        .dash-card:active {
            transform: scale(0.94);
        }

        .card-icon {
            width: 65px;
            height: 65px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--accent-blue);
            background: var(--accent-soft);
            border-radius: 20px;
            transition: all 0.3s ease;
        }

        .dash-card:hover .card-icon {
            transform: scale(1.1) rotate(5deg);
            background: var(--accent-blue);
            color: #ffffff;
        }

        .card-label {
            font-size: 1.4rem;
            font-weight: 700;
            color: var(--text-main);
        }

        /* Recent Activity */
        .recent-section {
            margin-top: 30px;
            padding: 20px;
            background: rgba(255, 255, 255, 0.6);
            border-radius: 24px;
            border: 1px solid rgba(255, 255, 255, 0.8);
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.02);
        }

        .recent-title {
            color: var(--text-dim);
            font-size: 0.9rem;
            margin-bottom: 5px;
            text-align: right;
            font-weight: 600;
        }

        .recent-subtitle {
            font-size: 1.3rem;
            font-weight: 700;
            color: var(--text-main);
            text-align: right;
        }

        /* Bottom Nav */
        nav {
            background: var(--nav-bg);
            backdrop-filter: blur(20px);
            padding: 12px 30px 35px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-top: 1px solid rgba(0, 0, 0, 0.05);
            position: sticky;
            bottom: 0;
            z-index: 100;
        }

        .nav-item {
            color: var(--text-dim);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 5px;
            cursor: pointer;
            transition: all 0.3s;
            width: 48px;
            height: 48px;
            justify-content: center;
            border-radius: 16px;
        }

        .nav-item.active {
            color: var(--accent-blue);
            background: var(--accent-soft);
        }

        .nav-item svg {
            width: 28px;
            height: 28px;
        }

        .nav-item:hover:not(.active) {
            background: #f8fafc;
            color: var(--accent-blue);
        }

        /* Decoration for Survey card */
        .dash-card.survey::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 4px;
            background: var(--accent-blue);
            opacity: 0;
            transition: 0.3s;
            animation: scan 3s infinite linear;
            box-shadow: 0 0 10px rgba(30, 64, 175, 0.3);
        }

        .dash-card.survey:hover::before {
            opacity: 1;
        }

        @keyframes scan {
            0% { top: 0; }
            100% { top: 100%; }
        }
    </style>
</head>
<body>
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>

    <header>
        <div class="logo-container">
            <div class="logo-main">
                <div class="logo-text-atlas">
                    ATLAS SURVEYING
                </div>
                <div class="logo-text-site">SITE FIELD</div>
            </div>
        </div>
    </header>

    <main>
        <div class="dashboard-grid">
            <div class="dash-card" onclick="alert('جديد clicked')">
                <div class="card-icon">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                        <circle cx="12" cy="12" r="10"></circle>
                        <line x1="12" y1="8" x2="12" y2="16"></line>
                        <line x1="8" y1="12" x2="16" y2="12"></line>
                    </svg>
                </div>
                <span class="card-label">جديد</span>
            </div>

            <div class="dash-card" onclick="alert('فحص clicked')">
                <div class="card-icon">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                        <circle cx="11" cy="11" r="8"></circle>
                        <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
                        <path d="M8 11l2 2 4-4"></path>
                    </svg>
                </div>
                <span class="card-label">فحص</span>
            </div>

            <div class="dash-card survey" onclick="alert('مسح clicked')">
                <div class="card-icon">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                        <rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect>
                        <line x1="3" y1="9" x2="21" y2="9"></line>
                        <line x1="3" y1="15" x2="21" y2="15"></line>
                        <line x1="9" y1="3" x2="9" y2="21"></line>
                        <line x1="15" y1="3" x2="15" y2="21"></line>
                    </svg>
                </div>
                <span class="card-label">مسح</span>
            </div>

            <div class="dash-card" onclick="alert('رصد clicked')">
                <div class="card-icon">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"></path>
                        <circle cx="12" cy="10" r="3"></circle>
                    </svg>
                </div>
                <span class="card-label">رصد</span>
            </div>
        </div>

        <div class="recent-section">
            <div class="recent-title">آخر نشاط</div>
            <div class="recent-subtitle">المشاريع</div>
        </div>
    </main>

    <nav>
        <div class="nav-item active">
            <svg viewBox="0 0 24 24" fill="currentColor"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"></path></svg>
        </div>
        <div class="nav-item">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"></circle><polyline points="12 6 12 12 16 14"></polyline></svg>
        </div>
        <div class="nav-item">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path><polyline points="14 2 14 8 20 8"></polyline><line x1="16" y1="13" x2="8" y2="13"></line><line x1="16" y1="17" x2="8" y2="17"></line><polyline points="10 9 9 9 8 9"></polyline></svg>
        </div>
        <div class="nav-item">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg>
        </div>
    </nav>
</body>
</html>
