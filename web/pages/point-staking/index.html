<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Atlas Surveying - توقيع نقاط</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800;900&family=Outfit:wght@600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../../shared/style.css">
    <link rel="stylesheet" href="../../shared/mobile-fix.css">
    <link rel="stylesheet" href="../../LIP/vendor/leaflet/leaflet.css">
    <script src="../../shared/auth.js"></script>
    <script src="../../shared/coordinates-export.js"></script>
      <link rel="stylesheet" href="page.css" />
</head>
<body class="page-scroll-enabled">
<div class="custom-page">
    <div class="form-container">
        <div class="header-btns">
            <button class="back-btn-header" type="button" onclick="window.location.href='../../index.html'">
                <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2.5" class="arrow-rtl-flip"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
                <span>العودة للرئيسية</span>
            </button>
        </div>

        <section class="card">
            <h1 class="title">توقيع نقاط</h1>
            <p class="sub-title">ارفع ملف النقاط المطلوب توقيعها: PDF أو DWG أو SDR أو CSV</p>
            <div class="upload-shell">
                <input type="file" id="pointsInput" class="hidden" accept=".pdf,.dwg,.sdr,.csv,application/pdf,text/csv">
                <button id="uploadBtn" class="file-btn" type="button">رفع ملف النقاط</button>
                <button id="exportCoordsBtn" class="export-open-btn" type="button" disabled>تصدير الإحداثيات</button>
                <p id="fileHint" class="sub-title file-hint-inline">لم يتم اختيار ملف بعد</p>

                <div class="options-row">
                    <label for="crsSelect">نظام الإحداثيات</label>
                    <select id="crsSelect">
                        <option value="DLTM">DLTM</option>
                        <option value="UTM40N">UTM Z40N</option>
                        <option value="UTM39N">UTM Z39N</option>
                    </select>
                </div>
            </div>
            <p id="statusText" class="status-text">بعد رفع الملف، ستظهر معاينة للنقاط ثم يمكنك بدء التوقيع.</p>
        </section>

        <section id="mapSection" class="card hidden">
            <div class="map-head">
                <h2 class="title title-no-bottom">خريطة النقاط</h2>
                <span id="pointsCount" class="points-count">0 نقطة</span>
            </div>

            <div class="legend-row">
                <span class="legend-chip"><span class="legend-dot legend-unmarked"></span>غير موقعة</span>
                <span class="legend-chip"><span class="legend-dot legend-marked"></span>موقعة</span>
                <span class="legend-chip"><span class="legend-dot legend-selected"></span>مختارة</span>
                <span class="legend-chip"><span class="legend-dot legend-hidden"></span>غير مرئية</span>
            </div>

            <div class="map-shell">
                <button id="backToPreviewBtn" class="staking-back-btn hidden" type="button">
                    <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2.5" class="arrow-rtl-flip"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
                    <span>الرجوع للمعاينة</span>
                </button>
                <div id="pointsMap" class="map-area"></div>
                <div id="overlayTools" class="overlay-tools hidden">
                    <div class="actions-row">
                        <button id="signBtn" class="sign-btn" type="button">توقيع</button>
                        <button id="invisibleBtn" class="invisible-btn" type="button">غير مرئية</button>
                    </div>
                    <div class="point-nav">
                        <button id="nextBtn" class="nav-btn" type="button" aria-label="النقطة التالية">◀</button>
                        <div id="pointName" class="point-name">-</div>
                        <button id="prevBtn" class="nav-btn" type="button" aria-label="النقطة السابقة">▶</button>
                    </div>
                </div>
            </div>

            <div class="preview-actions">
                <button id="startStakingBtn" class="start-staking-btn" type="button">بدء التوقيع</button>
            </div>
        </section>
    </div>
</div>

<script src="../../LIP/vendor/leaflet/leaflet.js"></script>
<script src="../../LIP/vendor/proj4/proj4.js"></script>
<script>
    const pointsInput = document.getElementById('pointsInput');
    const uploadBtn = document.getElementById('uploadBtn');
    const fileHint = document.getElementById('fileHint');
    const statusText = document.getElementById('statusText');
    const crsSelect = document.getElementById('crsSelect');
    const exportCoordsBtn = document.getElementById('exportCoordsBtn');
    const mapSection = document.getElementById('mapSection');
    const pointsCount = document.getElementById('pointsCount');
    const pointsMapHost = document.getElementById('pointsMap');
    const overlayTools = document.getElementById('overlayTools');
    const signBtn = document.getElementById('signBtn');
    const invisibleBtn = document.getElementById('invisibleBtn');
    const pointName = document.getElementById('pointName');
    const prevBtn = document.getElementById('prevBtn');
    const nextBtn = document.getElementById('nextBtn');
    const startStakingBtn = document.getElementById('startStakingBtn');
    const backToPreviewBtn = document.getElementById('backToPreviewBtn');

    const CRS_OPTIONS = {
        DLTM: {
            proj4: '+proj=tmerc +lat_0=0 +lon_0=55.3333333333333 +k=1 +x_0=500000 +y_0=0 +datum=WGS84 +units=m +no_defs +type=crs'
        },
        UTM40N: {
            proj4: '+proj=utm +zone=40 +datum=WGS84 +units=m +no_defs +type=crs'
        },
        UTM39N: {
            proj4: '+proj=utm +zone=39 +datum=WGS84 +units=m +no_defs +type=crs'
        }
    };

    const state = {
        pointsRaw: [],
        pointsMap: [],
        markers: [],
        signed: new Set(),
        invisible: new Set(),
        selectedIndex: -1,
        sourceFileName: '',
        map: null,
        layer: null,
        stakingMode: false
    };

    const MAP_MAX_ZOOM = 24;
    const MAP_MAX_NATIVE_ZOOM = 19;
    const SINGLE_POINT_ZOOM = 23;
    const AUTO_ZOOM_BOOST = 3;

    function setStatus(message, isError = false) {
        statusText.textContent = message;
        statusText.classList.toggle('error', isError);
    }

    function normalizeText(value) {
        return String(value || '')
            .replace(/\u00A0/g, ' ')
            .replace(/[،٬]/g, ',')
            .replace(/\s+/g, ' ')
            .trim();
    }

    function escapeHtml(value) {
        return String(value ?? '')
            .replaceAll('&', '&amp;')
            .replaceAll('<', '&lt;')
            .replaceAll('>', '&gt;')
            .replaceAll('"', '&quot;');
    }

    function normalizeNumberString(value) {
        return String(value || '').replace(/,/g, '.').trim();
    }

    function parseNumeric(value) {
        const num = Number(normalizeNumberString(value));
        return Number.isFinite(num) ? num : null;
    }

    function suggestedExportBaseName() {
        if (window.AtlasCoordinatesExport?.deriveSuggestedFileBaseName) {
            return window.AtlasCoordinatesExport.deriveSuggestedFileBaseName(
                state.sourceFileName,
                'points-staking',
            );
        }
        return 'points-staking';
    }

    function openCoordinatesExportForm() {
        if (!window.AtlasCoordinatesExport) {
            setStatus('تعذر فتح فورم تصدير الإحداثيات الآن.', true);
            return;
        }
        if (!state.pointsRaw.length) {
            setStatus('لا توجد نقاط جاهزة للتصدير.', true);
            return;
        }
        window.AtlasCoordinatesExport.open(state.pointsRaw, {
            sourceTitle: 'توقيع النقاط',
            sourcePage: 'point-staking',
            sourceCrs: crsSelect?.value || 'DLTM',
            suggestedBaseName: suggestedExportBaseName(),
        });
    }

    if (window.AtlasCoordinatesExport?.registerProvider) {
        window.AtlasCoordinatesExport.registerProvider(
            () => ({
                rows: state.pointsRaw,
                meta: {
                    sourceTitle: 'توقيع النقاط',
                    sourcePage: 'point-staking',
                    sourceCrs: crsSelect?.value || 'DLTM',
                    suggestedBaseName: suggestedExportBaseName(),
                },
            }),
            { id: 'point-staking' },
        );
    }

    function dedupePoints(rows) {
        const map = new Map();
        rows.forEach((row, index) => {
            const key = [
                normalizeText(row.name),
                normalizeNumberString(row.northing),
                normalizeNumberString(row.easting),
                normalizeNumberString(row.elevation),
                normalizeText(row.code)
            ].join('|').toLowerCase();
            if (map.has(key)) return;
            map.set(key, {
                id: `pt-${index + 1}`,
                name: normalizeText(row.name) || `P${map.size + 1}`,
                northing: normalizeNumberString(row.northing),
                easting: normalizeNumberString(row.easting),
                elevation: normalizeNumberString(row.elevation),
                code: normalizeText(row.code)
            });
        });
        return Array.from(map.values());
    }

    function splitColumns(text) {
        return String(text || '')
            .replace(/\u00A0/g, ' ')
            .replace(/[،]/g, ',')
            .split(/\t+|\s{2,}|[,;|]+|\s+/)
            .map((part) => part.trim())
            .filter(Boolean);
    }

    function parseGenericLines(lines) {
        const rows = [];
        lines.forEach((line) => {
            const clean = normalizeText(line);
            if (!clean) return;
            const tokens = splitColumns(clean);
            if (tokens.length < 3) return;

            for (let i = 0; i <= tokens.length - 3; i += 1) {
                const name = tokens[i];
                const north = tokens[i + 1];
                const east = tokens[i + 2];
                const n = parseNumeric(north);
                const e = parseNumeric(east);
                if (n === null || e === null) continue;

                const projected = Math.abs(n) >= 10000 && Math.abs(e) >= 10000;
                const latLon = (Math.abs(n) <= 90 && Math.abs(e) <= 180) || (Math.abs(e) <= 90 && Math.abs(n) <= 180);
                if (!projected && !latLon) continue;

                const zToken = tokens[i + 3];
                const z = parseNumeric(zToken);
                rows.push({
                    name: /[a-zA-Z]/.test(name) || /\d/.test(name) ? name : `P${rows.length + 1}`,
                    northing: north,
                    easting: east,
                    elevation: z === null ? '' : zToken,
                    code: ''
                });
                i += z === null ? 2 : 3;
            }
        });
        return dedupePoints(rows);
    }

    function parseCsvLine(line, delimiter) {
        const out = [];
        let part = '';
        let inQuotes = false;

        for (let i = 0; i < line.length; i += 1) {
            const ch = line[i];
            if (ch === '"') {
                if (inQuotes && line[i + 1] === '"') {
                    part += '"';
                    i += 1;
                } else {
                    inQuotes = !inQuotes;
                }
                continue;
            }
            if (ch === delimiter && !inQuotes) {
                out.push(part.trim());
                part = '';
                continue;
            }
            part += ch;
        }
        out.push(part.trim());
        return out;
    }

    function detectDelimiter(line) {
        const candidates = [',', ';', '\t', '|'];
        let best = ',';
        let bestScore = -1;
        candidates.forEach((candidate) => {
            const score = String(line || '').split(candidate).length;
            if (score > bestScore) {
                bestScore = score;
                best = candidate;
            }
        });
        return best;
    }

    function findHeaderIndex(headers, keys) {
        return headers.findIndex((header) => keys.some((key) => header.includes(key)));
    }

    function parseCsv(text) {
        const lines = String(text || '').split(/\r?\n/).filter((line) => line.trim());
        if (!lines.length) return [];

        const delimiter = detectDelimiter(lines[0]);
        const header = parseCsvLine(lines[0], delimiter).map((col) => normalizeText(col).toLowerCase());
        const idxName = findHeaderIndex(header, ['name', 'point', 'id', 'pt']);
        const idxNorth = findHeaderIndex(header, ['northing', 'north', 'y']);
        const idxEast = findHeaderIndex(header, ['easting', 'east', 'x']);
        const idxLat = findHeaderIndex(header, ['latitude', 'lat']);
        const idxLon = findHeaderIndex(header, ['longitude', 'lon', 'lng']);
        const idxElev = findHeaderIndex(header, ['elevation', 'elev', 'z', 'level', 'rl']);
        const idxCode = findHeaderIndex(header, ['code', 'description', 'desc']);
        const hasHeader = [idxName, idxNorth, idxEast, idxLat, idxLon].some((idx) => idx >= 0);

        if (!hasHeader) return parseGenericLines(lines);

        const rows = [];
        for (let i = 1; i < lines.length; i += 1) {
            const cols = parseCsvLine(lines[i], delimiter);
            let northing = idxNorth >= 0 ? cols[idxNorth] : '';
            let easting = idxEast >= 0 ? cols[idxEast] : '';
            if (!northing && idxLat >= 0) northing = cols[idxLat];
            if (!easting && idxLon >= 0) easting = cols[idxLon];
            if (parseNumeric(northing) === null || parseNumeric(easting) === null) continue;
            rows.push({
                name: idxName >= 0 ? cols[idxName] : `P${i}`,
                northing,
                easting,
                elevation: idxElev >= 0 ? cols[idxElev] : '',
                code: idxCode >= 0 ? cols[idxCode] : ''
            });
        }
        return dedupePoints(rows);
    }

    function parseSdr(text) {
        const lines = String(text || '').split(/\r?\n/);
        const rows = [];
        lines.forEach((line) => {
            if (!/^08KI/i.test(line || '')) return;
            const northing = line.slice(20, 36).trim();
            const easting = line.slice(36, 52).trim();
            if (parseNumeric(northing) === null || parseNumeric(easting) === null) return;
            rows.push({
                name: line.slice(4, 20).trim(),
                northing,
                easting,
                elevation: line.slice(52, 68).trim(),
                code: line.slice(68, 84).trim()
            });
        });
        if (rows.length) return dedupePoints(rows);
        return parseGenericLines(lines);
    }

    function parseDwg(text) {
        const lines = String(text || '').split(/\r?\n/).map((line) => line.trim());
        const dxfRows = [];

        for (let i = 0; i < lines.length; i += 1) {
            if (lines[i].toUpperCase() !== 'POINT') continue;
            let east = '';
            let north = '';
            let elev = '';
            for (let j = i + 1; j < lines.length - 1 && j < i + 36; j += 2) {
                const code = lines[j];
                const value = lines[j + 1];
                if (code === '10') east = value;
                if (code === '20') north = value;
                if (code === '30') elev = value;
            }
            if (parseNumeric(north) === null || parseNumeric(east) === null) continue;
            dxfRows.push({
                name: `P${dxfRows.length + 1}`,
                northing: north,
                easting: east,
                elevation: elev,
                code: ''
            });
        }

        const genericRows = parseGenericLines(lines);
        return dedupePoints([...dxfRows, ...genericRows]);
    }

    function toLatLng(point) {
        const north = parseNumeric(point.northing);
        const east = parseNumeric(point.easting);
        if (north === null || east === null) return null;

        if (Math.abs(north) <= 90 && Math.abs(east) <= 180) {
            return { lat: north, lon: east };
        }
        if (Math.abs(east) <= 90 && Math.abs(north) <= 180) {
            return { lat: east, lon: north };
        }

        const crs = CRS_OPTIONS[crsSelect.value];
        if (!crs || typeof window.proj4 !== 'function') return null;

        try {
            const [lon, lat] = window.proj4(crs.proj4, 'EPSG:4326', [east, north]);
            if (!Number.isFinite(lat) || !Number.isFinite(lon)) return null;
            return { lat, lon };
        } catch (_) {
            return null;
        }
    }

    function ensureMap() {
        if (state.map) return;
        state.map = L.map(pointsMapHost, {
            zoomControl: true,
            attributionControl: true,
            maxZoom: MAP_MAX_ZOOM
        });
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            maxZoom: MAP_MAX_ZOOM,
            maxNativeZoom: MAP_MAX_NATIVE_ZOOM,
            attribution: '&copy; OpenStreetMap contributors'
        }).addTo(state.map);
        state.layer = L.layerGroup().addTo(state.map);
        state.map.setView([25.2048, 55.2708], 13);
    }

    function updatePanel() {
        if (!state.stakingMode || !state.pointsMap.length || state.selectedIndex < 0) {
            overlayTools.classList.add('hidden');
            return;
        }
        overlayTools.classList.remove('hidden');
        const point = state.pointsMap[state.selectedIndex];
        pointName.textContent = `${point.name || 'Point'} (${state.selectedIndex + 1}/${state.pointsMap.length})`;
        prevBtn.disabled = state.selectedIndex <= 0;
        nextBtn.disabled = state.selectedIndex >= state.pointsMap.length - 1;
        const isSigned = state.signed.has(point.id);
        const isInvisible = state.invisible.has(point.id);
        signBtn.disabled = isSigned && !isInvisible;
        signBtn.textContent = isSigned && !isInvisible ? 'تم التوقيع' : 'توقيع';
        invisibleBtn.disabled = isInvisible;
        invisibleBtn.textContent = isInvisible ? 'غير مرئية ✓' : 'غير مرئية';
    }

    function pointDisplayLabel(point, index) {
        const raw = normalizeText(point?.name) || `P${index + 1}`;
        const numberMatch = raw.match(/\d+/);
        return numberMatch ? numberMatch[0] : raw.slice(0, 4);
    }

    function pointStateClass(point, index) {
        if (!point) return 'unmarked';
        if (state.invisible.has(point.id)) return 'hidden-point';
        if (state.signed.has(point.id)) return 'marked';
        if (index === state.selectedIndex) return 'selected';
        return 'unmarked';
    }

    function buildPointIcon(point, index) {
        const status = pointStateClass(point, index);
        const label = pointDisplayLabel(point, index);
        const size = status === 'selected' ? 36 : 30;
        return L.divIcon({
            className: `staking-point-icon ${status}`,
            html: `<span>${escapeHtml(label)}</span>`,
            iconSize: [size, size],
            iconAnchor: [size / 2, size / 2],
            popupAnchor: [0, -16],
        });
    }

    function updateMarkersStyle() {
        state.markers.forEach((marker, index) => {
            const point = state.pointsMap[index];
            const selected = index === state.selectedIndex;
            marker.setIcon(buildPointIcon(point, index));
            if (typeof marker.setZIndexOffset === 'function') {
                marker.setZIndexOffset(selected ? 1000 : 0);
            }
            if (selected && typeof marker.bringToFront === 'function') {
                marker.bringToFront();
            }
        });
    }

    function selectPoint(index, pan = true) {
        if (index < 0 || index >= state.pointsMap.length) return;
        state.selectedIndex = index;
        updateMarkersStyle();
        updatePanel();
        if (pan) {
            const point = state.pointsMap[index];
            state.map.panTo([point.lat, point.lon], { animate: true, duration: 0.35 });
            if (state.stakingMode && state.map.getZoom() < SINGLE_POINT_ZOOM - 1) {
                state.map.setZoom(SINGLE_POINT_ZOOM - 1, { animate: true });
            }
        }
    }

    function setStakingMode(enabled) {
        state.stakingMode = Boolean(enabled);
        document.body.classList.toggle('staking-fullscreen-mode', state.stakingMode);
        mapSection.classList.toggle('staking-fullscreen-section', state.stakingMode);
        backToPreviewBtn.classList.toggle('hidden', !state.stakingMode);
        startStakingBtn.disabled = !state.pointsMap.length;
        updatePanel();
        setTimeout(() => {
            state.map?.invalidateSize({ pan: false });
            if (state.pointsMap.length && state.selectedIndex >= 0) {
                const point = state.pointsMap[state.selectedIndex];
                state.map.setView([point.lat, point.lon], state.stakingMode ? SINGLE_POINT_ZOOM - 1 : state.map.getZoom(), { animate: false });
            }
        }, 80);
    }

    function renderMap() {
        mapSection.classList.remove('hidden');
        ensureMap();
        state.map.invalidateSize({ pan: false });
        state.layer.clearLayers();
        state.pointsMap = [];
        state.markers = [];
        state.selectedIndex = -1;

        const bounds = [];
        state.pointsRaw.forEach((point, index) => {
            const latLng = toLatLng(point);
            if (!latLng) return;
            const mapped = {
                ...point,
                id: point.id || `pt-${index + 1}`,
                lat: latLng.lat,
                lon: latLng.lon
            };
            const markerIndex = state.pointsMap.length;
            const marker = L.marker([mapped.lat, mapped.lon], {
                icon: buildPointIcon(mapped, markerIndex),
                keyboard: true,
                title: mapped.name || `P${index + 1}`,
            });
            marker.bindTooltip(mapped.name || `P${index + 1}`, {
                permanent: false,
                direction: 'top',
                offset: [0, -16],
                className: 'point-name-tooltip'
            });
            marker.on('click', () => selectPoint(markerIndex));

            marker.addTo(state.layer);
            state.pointsMap.push(mapped);
            state.markers.push(marker);
            bounds.push([mapped.lat, mapped.lon]);
        });

        pointsCount.textContent = `${state.pointsMap.length} نقطة`;
        startStakingBtn.disabled = state.pointsMap.length === 0;

        if (!state.pointsMap.length) {
            overlayTools.classList.add('hidden');
            setStakingMode(false);
            setStatus('لم أتمكن من عرض نقاط على الماب. غيّر نظام الإحداثيات أو راجع الملف.', true);
            return;
        }

        state.map.invalidateSize({ pan: false });
        if (bounds.length === 1) {
            state.map.setView(bounds[0], SINGLE_POINT_ZOOM, { animate: false });
        } else {
            state.map.fitBounds(bounds, {
                paddingTopLeft: [24, 24],
                paddingBottomRight: [24, 120],
                maxZoom: MAP_MAX_ZOOM
            });
            const boosted = Math.min(MAP_MAX_ZOOM, state.map.getZoom() + AUTO_ZOOM_BOOST);
            state.map.setZoom(boosted, { animate: false });
        }

        selectPoint(0, false);
        updateMarkersStyle();
        setStakingMode(false);
        setTimeout(() => state.map?.invalidateSize({ pan: false }), 0);
    }

    function signCurrent() {
        if (state.selectedIndex < 0 || state.selectedIndex >= state.pointsMap.length) return;
        const point = state.pointsMap[state.selectedIndex];
        const wasInvisible = state.invisible.has(point.id);
        if (state.signed.has(point.id) && !wasInvisible) return;
        state.invisible.delete(point.id);
        state.signed.add(point.id);
        updateMarkersStyle();
        updatePanel();
        setStatus(
            wasInvisible
                ? `تم إعادة توقيع النقطة: ${point.name || `Point ${state.selectedIndex + 1}`}`
                : `تم توقيع النقطة: ${point.name || `Point ${state.selectedIndex + 1}`}`
        );
    }

    function markCurrentInvisible() {
        if (state.selectedIndex < 0 || state.selectedIndex >= state.pointsMap.length) return;
        const point = state.pointsMap[state.selectedIndex];
        if (state.invisible.has(point.id)) return;
        state.signed.delete(point.id);
        state.invisible.add(point.id);
        updateMarkersStyle();
        updatePanel();
        setStatus(`تم تعليم النقطة كغير مرئية: ${point.name || `Point ${state.selectedIndex + 1}`}`);
    }

    function movePoint(step) {
        if (!state.pointsMap.length) return;
        const target = state.selectedIndex + step;
        if (target < 0 || target >= state.pointsMap.length) return;
        selectPoint(target);
    }

    async function readPoints(file) {
        const ext = (file.name.split('.').pop() || '').toLowerCase();
        if (ext === 'pdf') {
            return {
                points: [],
                warning: 'تم رفع PDF. العرض المباشر للنقاط على الماب متاح حالياً لملفات DWG وSDR وCSV.'
            };
        }

        let text = '';
        try {
            text = await file.text();
        } catch (_) {
            const buffer = await file.arrayBuffer();
            text = new TextDecoder('utf-8', { fatal: false }).decode(buffer);
        }

        if (ext === 'csv') return { points: parseCsv(text), warning: '' };
        if (ext === 'sdr') return { points: parseSdr(text), warning: '' };
        if (ext === 'dwg') return { points: parseDwg(text), warning: '' };
        return { points: parseGenericLines(text.split(/\r?\n/)), warning: '' };
    }

    uploadBtn.addEventListener('click', () => pointsInput.click());

    pointsInput.addEventListener('change', async () => {
        const file = pointsInput.files?.[0];
        if (!file) return;
        state.sourceFileName = file.name;
        fileHint.textContent = `تم اختيار: ${file.name}`;
        setStatus('جاري قراءة الملف...');

        try {
            const { points, warning } = await readPoints(file);
            if (warning) {
                state.pointsRaw = [];
                setStakingMode(false);
                mapSection.classList.add('hidden');
                exportCoordsBtn.disabled = true;
                setStatus(warning);
                window.AtlasCoordinatesExport?.updateButtonState?.();
                return;
            }

            state.pointsRaw = points;
            state.signed = new Set();
            state.invisible = new Set();
            exportCoordsBtn.disabled = state.pointsRaw.length === 0;
            window.AtlasCoordinatesExport?.updateButtonState?.();

            if (!state.pointsRaw.length) {
                setStakingMode(false);
                mapSection.classList.add('hidden');
                exportCoordsBtn.disabled = true;
                const dwg = file.name.toLowerCase().endsWith('.dwg');
                setStatus(
                    dwg
                        ? 'تعذر استخراج نقاط من DWG. يفضل تصديره كملف CSV أو SDR أو DXF نصي.'
                        : 'لم يتم العثور على نقاط صالحة داخل الملف.',
                    true
                );
                window.AtlasCoordinatesExport?.updateButtonState?.();
                return;
            }

            try {
                renderMap();
            } catch (mapError) {
                console.error(mapError);
                setStakingMode(false);
                mapSection.classList.add('hidden');
                setStatus('تمت قراءة الملف، لكن حدث خطأ أثناء عرض الخريطة. جرّب تغيير نظام الإحداثيات أو إعادة تحميل الصفحة.', true);
                return;
            }
            setStatus(`تم تحميل ${state.pointsRaw.length} نقطة. راجع المعاينة ثم اضغط بدء التوقيع.`);
        } catch (error) {
            console.error(error);
            state.pointsRaw = [];
            setStakingMode(false);
            mapSection.classList.add('hidden');
            exportCoordsBtn.disabled = true;
            setStatus('حدث خطأ أثناء قراءة الملف. تأكد من أن صيغة الملف صحيحة.', true);
            window.AtlasCoordinatesExport?.updateButtonState?.();
        }
    });

    crsSelect.addEventListener('change', () => {
        if (!state.pointsRaw.length) return;
        renderMap();
    });

    startStakingBtn.addEventListener('click', () => {
        if (!state.pointsMap.length) return;
        setStakingMode(true);
        setStatus('وضع التوقيع مفعل. اختر النقطة ثم اضغط توقيع.');
    });
    backToPreviewBtn.addEventListener('click', () => {
        setStakingMode(false);
        setStatus(`معاينة ${state.pointsMap.length} نقطة. اضغط بدء التوقيع للمتابعة.`);
    });
    signBtn.addEventListener('click', signCurrent);
    invisibleBtn.addEventListener('click', markCurrentInvisible);
    exportCoordsBtn.addEventListener('click', openCoordinatesExportForm);
    prevBtn.addEventListener('click', () => movePoint(-1));
    nextBtn.addEventListener('click', () => movePoint(1));

    window.addEventListener('resize', () => state.map?.invalidateSize());
</script>
<script>
    document.addEventListener('DOMContentLoaded', async () => {
        if (!window.AtlasAuth) return;
        await window.AtlasAuth.initialize();
        const allowed = await window.AtlasAuth.requirePageAccess('pages.point-staking');
        if (!allowed) return;
        window.AtlasAuth.decorateShell();
    });
</script>
</body>
