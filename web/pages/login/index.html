<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Atlas Surveying - تسجيل الدخول</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&family=Outfit:wght@400;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../../shared/style.css" />
  <link rel="stylesheet" href="../../shared/mobile-fix.css" />
    <link rel="stylesheet" href="page.css" />
</head>
<body class="page-scroll-enabled">
  <div class="login-page">
    <div class="login-shell">
      <div class="brand">
        <img src="../../icons/brand-logo.png" alt="Atlas" />
        <div>
          <h1>ATLAS SURVEYING</h1>
          <p>بوابة تسجيل الدخول ولوحة الإدارة وإدارة الصلاحيات والصفحات.</p>
        </div>
      </div>

      <section class="info-card">
        <h2>وضع التشغيل</h2>
        <p id="modeLabel" class="muted">جاري التحقق من وضع التشغيل...</p>
        <div class="quick-note">
          لا يتم عرض بيانات الدخول الافتراضية داخل التطبيق. عند التطوير المحلي استخدم `atlasLocalAdminPassword` أو `atlas_local_password`.
        </div>
      </section>

      <section class="login-card">
        <h2>تسجيل الدخول</h2>
        <form id="loginForm">
          <div class="field">
            <label for="username">اسم المستخدم</label>
            <input id="username" name="username" type="text" autocomplete="username" required />
          </div>
          <div class="field">
            <label for="password">كلمة المرور</label>
            <input id="password" name="password" type="password" autocomplete="current-password" required />
          </div>
          <button id="submitBtn" class="login-btn" type="submit">دخول</button>
          <div id="status" class="status"></div>
        </form>
      </section>
    </div>
  </div>

  <script src="../../shared/auth.js"></script>
    <script src="../../shared/coordinates-export.js"></script>
  <script>
    const statusEl = document.getElementById("status");
    const submitBtn = document.getElementById("submitBtn");
    const modeLabel = document.getElementById("modeLabel");

    async function resolveRedirectTarget() {
      const params = new URLSearchParams(window.location.search);
      const explicitTarget = params.get("redirect");
      if (explicitTarget) return explicitTarget;
      return window.AtlasAuth.getDefaultAuthorizedUrl();
    }

    function setStatus(message, isOk = false) {
      statusEl.textContent = message || "";
      statusEl.classList.toggle("ok", Boolean(isOk));
    }

    document.addEventListener("DOMContentLoaded", async () => {
      await window.AtlasAuth.initialize();

      const mode = await window.AtlasStore.getMode();
      modeLabel.textContent =
        mode === "cloudflare"
          ? "Cloudflare mode: يتم حفظ المستخدمين والصفحات والمواقع عبر KV / R2."
          : mode === "local"
            ? "Local mode: مفعل للتطوير المحلي فقط عبر localhost مع atlas_local_mode=1."
            : (window.AtlasAuth.state.bootstrapError || "Authentication is unavailable on this deployment.");

      if (mode === "unavailable") {
        submitBtn.disabled = true;
        setStatus(window.AtlasAuth.state.bootstrapError || "تعذر تسجيل الدخول لأن المصادقة السحابية غير متاحة.");
      }

      const user = window.AtlasAuth.getCurrentUser();
      if (user) {
        window.location.href = await resolveRedirectTarget();
      }
    });

    document.getElementById("loginForm").addEventListener("submit", async (event) => {
      event.preventDefault();
      setStatus("");
      submitBtn.disabled = true;

      try {
        const username = document.getElementById("username").value;
        const password = document.getElementById("password").value;
        await window.AtlasAuth.login(username, password);
        setStatus("تم تسجيل الدخول بنجاح", true);
        window.location.href = await resolveRedirectTarget();
      } catch (error) {
        setStatus(error.message || "تعذر تسجيل الدخول");
      } finally {
        submitBtn.disabled = false;
      }
    });
  </script>
</body>
</html>
