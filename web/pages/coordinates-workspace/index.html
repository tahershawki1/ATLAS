<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Atlas Surveying - مركز الإحداثيات</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800;900&family=Outfit:wght@600;700;800;900&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../../shared/style.css" />
  <link rel="stylesheet" href="../../shared/mobile-fix.css" />
  <script src="../../shared/auth.js"></script>
  <link rel="icon" type="image/png" href="../../icons/brand-logo.png" />
  <style>
    html,
    body {
      width: 100%;
      height: 100%;
      margin: 0;
    }

    body.page-scroll-enabled {
      min-height: 100vh;
      min-height: 100dvh;
      overflow: hidden;
    }

    body.page-scroll-enabled .custom-page {
      height: 100vh;
      height: 100dvh;
      min-height: 720px;
      display: grid;
      grid-template-rows: minmax(0, 1fr);
      background:
        radial-gradient(circle at top right, rgba(241, 135, 62, 0.14) 0%, transparent 30%),
        radial-gradient(circle at bottom left, rgba(10, 127, 138, 0.12) 0%, transparent 34%),
        linear-gradient(180deg, #f8fafc 0%, #eef2f7 100%);
      overflow: hidden;
    }

    .workspace-shell {
      width: min(100%, 1540px);
      height: 100%;
      min-height: 0;
      margin: 0 auto;
      padding: 14px;
      display: grid;
      grid-template-rows: auto minmax(0, 1fr);
      gap: 12px;
    }

    .workspace-top {
      min-width: 0;
      display: grid;
      grid-template-columns: auto minmax(0, 1fr) auto;
      gap: 12px;
      align-items: center;
      padding: 12px;
      border-radius: 8px;
      border: 1px solid rgba(30, 64, 175, 0.12);
      background: rgba(255, 255, 255, 0.94);
      box-shadow: 0 18px 42px rgba(15, 23, 42, 0.08);
    }

    .back-btn,
    .mode-btn,
    .open-btn {
      min-height: 44px;
      border-radius: 8px;
      border: 1px solid rgba(30, 64, 175, 0.14);
      background: #ffffff;
      color: var(--primary);
      font-family: inherit;
      font-size: 0.82rem;
      font-weight: 900;
      cursor: pointer;
      transition: var(--transition);
    }

    .back-btn,
    .open-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 0 13px;
      white-space: nowrap;
    }

    .back-btn:hover,
    .mode-btn:hover,
    .open-btn:hover {
      transform: translateY(-1px);
      box-shadow: 0 10px 18px rgba(15, 23, 42, 0.08);
    }

    .workspace-title {
      min-width: 0;
      display: grid;
      gap: 2px;
    }

    .workspace-title h1 {
      margin: 0;
      color: var(--primary);
      font-size: clamp(1rem, 1.4vw, 1.35rem);
      font-weight: 900;
      line-height: 1.35;
    }

    .workspace-title p {
      margin: 0;
      color: var(--text-dim);
      font-size: 0.78rem;
      font-weight: 800;
      line-height: 1.7;
    }

    .mode-switch {
      display: grid;
      grid-template-columns: repeat(2, minmax(120px, 1fr));
      gap: 6px;
      padding: 5px;
      border-radius: 8px;
      border: 1px solid rgba(30, 64, 175, 0.1);
      background: #f8fafc;
    }

    .mode-btn {
      padding: 0 12px;
    }

    .mode-btn.active {
      border-color: transparent;
      background: linear-gradient(135deg, #0a7f8a 0%, #1e3a8a 100%);
      color: #ffffff;
      box-shadow: 0 10px 20px rgba(10, 127, 138, 0.18);
    }

    .workspace-frame-shell {
      height: 100%;
      min-height: 0;
      border-radius: 8px;
      border: 1px solid rgba(30, 64, 175, 0.12);
      background: #ffffff;
      box-shadow: 0 24px 54px rgba(15, 23, 42, 0.08);
      overflow: hidden;
    }

    .tool-frame {
      display: none;
      width: 100%;
      height: 100%;
      min-height: 640px;
      border: 0;
      background: #ffffff;
    }

    .tool-frame.active {
      display: block;
    }

    @media (max-width: 860px) {
      body.page-scroll-enabled .custom-page {
        min-height: 100dvh;
        height: auto;
        overflow: auto;
      }

      .workspace-shell {
        min-height: 100vh;
        min-height: 100dvh;
        padding: 10px;
        grid-template-rows: auto minmax(620px, 1fr);
      }

      .workspace-top {
        grid-template-columns: 1fr;
      }

      .back-btn,
      .open-btn {
        width: 100%;
      }

      .mode-switch {
        grid-template-columns: 1fr;
      }

      .workspace-frame-shell {
        min-height: 720px;
      }
    }
  </style>
</head>
<body class="page-scroll-enabled">
  <div class="custom-page">
    <main class="workspace-shell">
      <div data-auth-shell></div>
      <header class="workspace-top">
        <button class="back-btn" type="button" id="homeBtn">
          <span aria-hidden="true">‹</span>
          <span>الرئيسية</span>
        </button>

        <div class="workspace-title">
          <h1>مركز الإحداثيات</h1>
          <p id="modeDescription">استخراج تلقائي من PDF أو صورة، مع إمكانية الانتقال للتحديد اليدوي من نفس الشاشة.</p>
        </div>

        <div class="mode-switch" role="tablist" aria-label="اختيار وضع استخراج الإحداثيات">
          <button class="mode-btn active" type="button" role="tab" aria-selected="true" data-mode="auto">استخراج تلقائي</button>
          <button class="mode-btn" type="button" role="tab" aria-selected="false" data-mode="manual">تحديد يدوي</button>
        </div>

        <button class="open-btn" type="button" id="openStandaloneBtn">فتح الوضع الحالي</button>
      </header>

      <section class="workspace-frame-shell" aria-label="أداة الإحداثيات">
        <iframe id="autoFrame" class="tool-frame active" title="استخراج تلقائي"></iframe>
        <iframe id="manualFrame" class="tool-frame" title="تحديد يدوي"></iframe>
      </section>
    </main>
  </div>

  <script>
    const params = new URLSearchParams(window.location.search);
    const sharedSuffix = params.get("shared") === "1" ? "?shared=1" : "";
    const initialMode = params.get("mode") === "manual" ? "manual" : "auto";

    const modeConfig = {
      auto: {
        frameId: "autoFrame",
        url: `../coordinates-proposal/index.html${sharedSuffix}`,
        description: "استخراج تلقائي من PDF أو صورة، مع إمكانية الانتقال للتحديد اليدوي من نفس الشاشة.",
      },
      manual: {
        frameId: "manualFrame",
        url: `../coordinates-extractor/index.html${sharedSuffix}`,
        description: "تحديد مناطق الجدول يدويًا من ملف PDF ثم استخراج الإحداثيات ومراجعتها.",
      },
    };

    const modeButtons = Array.from(document.querySelectorAll("[data-mode]"));
    const frames = {
      auto: document.getElementById("autoFrame"),
      manual: document.getElementById("manualFrame"),
    };
    const modeDescription = document.getElementById("modeDescription");
    const openStandaloneBtn = document.getElementById("openStandaloneBtn");
    let activeMode = initialMode;

    function ensureFrameLoaded(mode) {
      const config = modeConfig[mode];
      const frame = frames[mode];
      if (!frame || !config) return;
      if (!frame.getAttribute("src")) frame.setAttribute("src", config.url);
    }

    function setMode(mode) {
      if (!modeConfig[mode]) return;
      activeMode = mode;
      ensureFrameLoaded(mode);

      Object.entries(frames).forEach(([key, frame]) => {
        frame.classList.toggle("active", key === mode);
      });

      modeButtons.forEach((button) => {
        const selected = button.dataset.mode === mode;
        button.classList.toggle("active", selected);
        button.setAttribute("aria-selected", selected ? "true" : "false");
      });

      modeDescription.textContent = modeConfig[mode].description;
      const nextUrl = new URL(window.location.href);
      nextUrl.searchParams.set("mode", mode);
      if (sharedSuffix) nextUrl.searchParams.set("shared", "1");
      window.history.replaceState(null, "", nextUrl.toString());
    }

    modeButtons.forEach((button) => {
      button.addEventListener("click", () => setMode(button.dataset.mode));
    });

    openStandaloneBtn.addEventListener("click", () => {
      window.location.href = modeConfig[activeMode].url;
    });

    document.getElementById("homeBtn").addEventListener("click", () => {
      window.location.href = "../../index.html";
    });

    document.addEventListener("DOMContentLoaded", async () => {
      if (window.AtlasAuth) {
        await window.AtlasAuth.initialize();
        const allowed =
          window.AtlasAuth.canAccess("pages.coordinates-workspace") ||
          window.AtlasAuth.canAccess("pages.coordinates-proposal") ||
          window.AtlasAuth.canAccess("pages.coordinates-extractor");
        if (!allowed) {
          await window.AtlasAuth.requirePageAccess("pages.coordinates-workspace");
          return;
        }
        window.AtlasAuth.decorateShell();
      }
      ensureFrameLoaded("auto");
      setMode(activeMode);
    });
  </script>
</body>
</html>
