<!doctype html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
    />
    <title>Atlas Engineering - Mobile Site</title>
    <meta name="description" content="Atlas Engineering Site Management System">
    <meta name="theme-color" content="#00d4ff">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="manifest" href="manifest.json">
    <link rel="icon" type="image/png" href="icons/brand-logo.png">
    <link rel="apple-touch-icon" href="icons/icon-192.png">
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&family=Outfit:wght@400;600;700;800;900&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="shared/style.css" />
    <link rel="stylesheet" href="shared/mobile-fix.css" />
  </head>
  <body class="page-scroll-enabled">
    <!-- Update Banner -->
    <div id="updateBanner" class="update-banner">
        <span>تحديث جديد متاح!</span>
        <button onclick="location.reload()">تحديث الآن</button>
    </div>

    <div id="app" class="app-container">
      <!-- Background Elements -->
      <div class="bg-blur"></div>
      <div class="bg-gradient"></div>

      <!-- Header -->
      <header class="main-header">
        <div class="logo-wrapper">
          <div class="logo">
            <img src="icons/brand-logo.png" alt="Atlas" class="header-logo">
          </div>
          <span class="logo-text-brand">ATLAS SURVEYING</span>
        </div>
        <div class="header-right">
            <div id="selectedSiteDisplay" class="header-site-box" onclick="app.showSiteSelector()">
                <div class="header-site-info">
                    <span id="siteCompany" class="site-company-text">تحديد الشركة</span>
                    <span id="siteName" class="site-plot-text">رقم الأرض</span>
                </div>
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0118 0z"/><circle cx="12" cy="10" r="3"/></svg>
            </div>
            <div id="navTitle" class="nav-title">الرئيسية</div>
        </div>
      </header>


      <!-- Main Content -->
      <main id="mainContent" class="content-wrapper">
        <div data-auth-shell></div>
        <button class="global-back-btn" onclick="app.goBackGlobal()" aria-label="العودة">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" style="transform: rotate(180deg);">
            <path d="M19 12H5M12 19l-7-7 7-7" />
          </svg>
          <span>العودة</span>
        </button>
        <!-- Home Menu -->
        <div id="homePage" class="page active">
          <div class="grid-menu">
            <button class="menu-card" data-permission="pages.new" onclick="window.location.href='pages/new/'">
              <div class="icon-wrapper new-icon">
                <svg
                  viewBox="0 0 24 24"
                  fill="none"
                  stroke="currentColor"
                  stroke-width="2"
                >
                  <path d="M12 5v14M5 12h14" />
                </svg>
              </div>
              <span class="card-label">جديد</span>
            </button>

            <button class="menu-card" data-permission="pages.check" onclick="window.location.href='pages/check/'">
              <div class="icon-wrapper check-icon">
                <svg
                  viewBox="0 0 24 24"
                  fill="none"
                  stroke="currentColor"
                  stroke-width="2"
                >
                  <path
                    d="M22 11.08V12a10 10 0 11-5.93-9.14M22 4L12 14.01l-3-3"
                  />
                </svg>
              </div>
              <span class="card-label">تشييك</span>
            </button>

            <button class="menu-card" data-permission="pages.survey" onclick="window.location.href='pages/survey/'">
              <div class="icon-wrapper survey-icon">
                <svg
                  viewBox="0 0 24 24"
                  fill="none"
                  stroke="currentColor"
                  stroke-width="2"
                >
                  <path
                    d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4M17 8l-5-5-5 5M12 3v12"
                  />
                </svg>
              </div>
              <span class="card-label">رفع</span>
            </button>

            <button class="menu-card" data-permission="pages.point-staking" onclick="window.location.href='pages/point-staking/'">
              <div class="icon-wrapper stake-icon">
                <svg
                  viewBox="0 0 24 24"
                  fill="none"
                  stroke="currentColor"
                  stroke-width="2"
                >
                  <circle cx="12" cy="12" r="10" />
                  <path d="M12 8v8M8 12h8" />
                </svg>
              </div>
              <span class="card-label">توقيع</span>
            </button>

            <button class="menu-card" data-permission="pages.level-budget" onclick="window.location.href='pages/level-budget/'">
              <div class="icon-wrapper new-icon">
                <svg
                  viewBox="0 0 24 24"
                  fill="none"
                  stroke="currentColor"
                  stroke-width="2"
                >
                  <path d="M4 6h16M4 12h16M4 18h16" />
                </svg>
              </div>
              <span class="card-label">جدول الميزانية والتحقق</span>
            </button>

            <button class="menu-card" data-permission="pages.site-management" onclick="window.location.href='pages/site-management/'">
              <div class="icon-wrapper survey-icon">
                <svg
                  viewBox="0 0 24 24"
                  fill="none"
                  stroke="currentColor"
                  stroke-width="2"
                >
                  <path d="M3 3h18v4H3z" />
                  <path d="M7 9h10M7 13h10M7 17h6" />
                </svg>
              </div>
              <span class="card-label">إدارة الشركات والمناطق والمواقع</span>
            </button>

            <button class="menu-card" data-permission="pages.coordinates-extractor" onclick="window.location.href='pages/coordinates-extractor/'">
              <div class="icon-wrapper">
                <svg
                  viewBox="0 0 24 24"
                  fill="none"
                  stroke="currentColor"
                  stroke-width="2"
                >
                  <rect x="3" y="11" width="18" height="11" rx="2" ry="2" />
                  <path d="M7 11V7a5 5 0 0110 0v4" />
                </svg>
              </div>
              <span class="card-label">استخراج الاحداثيات</span>
            </button>

            <button class="menu-card" data-permission="pages.coordinates-proposal" onclick="window.location.href='pages/coordinates-proposal/'">
              <div class="icon-wrapper">
                <svg
                  viewBox="0 0 24 24"
                  fill="none"
                  stroke="currentColor"
                  stroke-width="2"
                >
                  <path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z" />
                  <path d="M14 2v6h6" />
                  <path d="M9 14h6M9 18h6M9 10h3" />
                </svg>
              </div>
              <span class="card-label">فحص المخطط واستخراج الإحداثيات</span>
            </button>
          </div>
        </div>
        <!-- Action Form Page (Dynamic) -->
        <div id="actionPage" class="page">
          <div class="page-header">
            <h2 id="actionPageTitle">العمل</h2>
          </div>
          
          <div class="action-card">
              <div class="site-info-bar">
                  <div class="info-tag"> <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0118 0z"/><circle cx="12" cy="10" r="3"/></svg> <span id="actionSitePlot"></span> </div>
                  <div class="info-tag"> <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg> <span id="actionSiteCompany"></span> </div>
              </div>
              
              <div id="actionFormContainer">
                  <!-- Form content will be dynamic -->
              </div>
              
              <div class="capture-section">
                  <label>ملاحظات / صور</label>
                  <div class="media-grid">
                      <button class="media-add-btn">
                          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/><circle cx="12" cy="13" r="4"/></svg>
                          <span>صورة</span>
                      </button>
                      <textarea id="actionNotes" placeholder="أضف ملاحظاتك هنا..."></textarea>
                  </div>
              </div>

              <button class="submit-btn highlight" onclick="app.submitAction()">حفظ وإرسال التقرير</button>
          </div>
        </div>
      </main>

      <!-- Footer / Status Bar -->
      <footer class="main-footer">
        <div class="status-indicator">
          <span class="status-dot"></span>
          <span class="status-text">Atlas Engineering System</span>
          <span class="version-tag">v2.0.0</span>
        </div>
      </footer>


      <!-- Site Selector Modal -->
      <div id="siteModal" class="modal-overlay">
          <div class="modal-content">
              <div class="modal-header">
                  <h3>تحديد موقع العمل</h3>
                  <div class="modal-actions">
                      <button class="icon-btn" onclick="app.toggleSearch()" title="بحث">
                          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/></svg>
                      </button>
                      <button class="icon-btn" data-permission="sites.write" onclick="app.showAddSite()" title="إضافة موقع جديد">
                          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
                      </button>
                      <button class="icon-btn close-btn" onclick="app.closeSiteModal()" title="إغلاق">
                          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
                      </button>
                  </div>
              </div>

              <div id="modalSearchBox" class="modal-search-box">
                  <input type="text" id="siteSearchInput" placeholder="ابحث عن رقم الأرض..." oninput="app.filterBySearch()">
              </div>

              <div id="siteFormContent">
                  <div id="step1" class="modal-step active">
                      <div class="modal-sub-header">
                        <h4>اختر الشركة</h4>
                      </div>
                      <div id="companyList" class="custom-list-selector">
                          <!-- Companies will be injected here -->
                      </div>
                  </div>

                  <div id="step2" class="modal-step">
                      <div class="modal-sub-header">
                        <button class="small-back-btn" onclick="app.modalStep(1)">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
                        </button>
                        <h4>اختر المنطقة</h4>
                      </div>
                      <div id="areaList" class="custom-list-selector">
                          <!-- Areas will be injected here -->
                      </div>
                  </div>

                  <div id="step3" class="modal-step">
                      <div class="modal-sub-header">
                        <button class="small-back-btn" onclick="app.modalStep(2)">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
                        </button>
                        <h4>اختر رقم الأرض</h4>
                      </div>
                      <div id="plotList" class="custom-list-selector">
                          <!-- Plots will be injected here -->
                      </div>
                  </div>

                  <div id="step4" class="modal-step">
                      <div class="modal-sub-header">
                        <button class="small-back-btn" onclick="app.modalStep(3)">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
                        </button>
                        <h4>تأكيد الموقع</h4>
                      </div>
                      <div class="site-summary-card">
                          <div class="summary-item">
                              <label>الشركة</label>
                              <span id="summaryCompany"></span>
                          </div>
                          <div class="summary-item">
                              <label>المنطقة</label>
                              <span id="summaryArea"></span>
                          </div>
                          <div class="summary-item">
                              <label>رقم الأرض</label>
                              <span id="summaryPlot"></span>
                          </div>
                      </div>
                      <button type="button" onclick="app.saveSiteFinal()" class="submit-btn highlight">
                          <span>تأكيد وبدء العمل</span>
                          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                              <line x1="22" y1="2" x2="11" y2="13"></line>
                              <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
                          </svg>
                      </button>
                  </div>

                  <div id="stepAdd" class="modal-step">
                      <div class="modal-sub-header">
                        <button class="small-back-btn" onclick="app.modalStep(1)">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
                        </button>
                        <h4>إضافة موقع جديد</h4>
                      </div>
                      <div class="add-site-form">
                          <div class="form-group-light">
                              <label>اسم الشركة</label>
                              <div class="form-field-inline">
                                  <select id="newSiteCompany" required></select>
                                  <button type="button" class="field-add-btn" onclick="app.addNewSiteCompany()" title="إضافة شركة جديدة" aria-label="إضافة شركة جديدة">+</button>
                              </div>
                          </div>
                          <div class="form-group-light">
                              <label>المنطقة</label>
                              <div class="form-field-inline">
                                  <input type="text" id="newSiteArea" list="newSiteAreaOptions" placeholder="اختر أو اكتب المنطقة" required>
                                  <button type="button" class="field-add-btn company-dependent-add-btn hidden" onclick="app.addCompanyReference('area')" title="حفظ المنطقة للشركة" aria-label="حفظ المنطقة للشركة">+</button>
                              </div>
                              <datalist id="newSiteAreaOptions"></datalist>
                          </div>
                          <div class="form-group-light">
                              <label>رقم الأرض</label>
                              <input type="text" id="newSitePlot" placeholder="أدخل رقم الأرض" required>
                          </div>
                          <div class="form-group-light">
                              <label>اسم المالك</label>
                              <input type="text" id="newSiteOwner" placeholder="أدخل اسم المالك" required>
                          </div>
                          <div class="form-group-light">
                              <label>اسم الاستشاري</label>
                              <div class="form-field-inline">
                                  <input type="text" id="newSiteConsultant" list="newSiteConsultantOptions" placeholder="اختر أو اكتب الاستشاري" required>
                                  <button type="button" class="field-add-btn company-dependent-add-btn hidden" onclick="app.addCompanyReference('consultant')" title="حفظ الاستشاري للشركة" aria-label="حفظ الاستشاري للشركة">+</button>
                              </div>
                              <datalist id="newSiteConsultantOptions"></datalist>
                          </div>
                          <div class="form-group-light">
                              <label>اسم المشروع</label>
                              <input type="text" id="newSiteProject" placeholder="أدخل اسم المشروع" required>
                          </div>
                          <div class="form-group-light">
                              <label>اسم المقاول</label>
                              <div class="form-field-inline">
                                  <input type="text" id="newSiteContractor" list="newSiteContractorOptions" placeholder="اختر أو اكتب المقاول" required>
                                  <button type="button" class="field-add-btn company-dependent-add-btn hidden" onclick="app.addCompanyReference('contractor')" title="حفظ المقاول للشركة" aria-label="حفظ المقاول للشركة">+</button>
                              </div>
                              <datalist id="newSiteContractorOptions"></datalist>
                          </div>
                          <div class="form-group-light">
                              <label>سنة التقرير</label>
                              <input type="text" id="newSiteReportYear" placeholder="أدخل سنة التقرير" required>
                          </div>
                          <div class="form-group-light">
                              <label>شهر التقرير</label>
                              <input type="text" id="newSiteReportMonth" placeholder="أدخل شهر التقرير" required>
                          </div>
                          <div class="form-group-light">
                              <label>رقم التقرير في الشهر</label>
                              <input type="text" id="newSiteReportNumberInMonth" placeholder="أدخل رقم التقرير في الشهر" required>
                          </div>
                          <div class="form-group-light">
                              <label>رقم التقرير المصدر</label>
                              <input type="text" id="newSiteSourceReportId" placeholder="أدخل رقم التقرير المصدر" required>
                          </div>
                          <div class="form-group-light">
                              <label>تاريخ المسح</label>
                              <input type="text" id="newSiteSurveyDate" placeholder="أدخل تاريخ المسح" required>
                          </div>
                          <div class="form-group-light">
                              <label>موضوع التقرير</label>
                              <input type="text" id="newSiteSubject" placeholder="أدخل موضوع التقرير" required>
                          </div>
                          <div class="form-group-light">
                              <label>اسم المساح</label>
                              <input type="text" id="newSiteSurveyor" placeholder="MR. " required>
                          </div>
                          <div class="form-group-light levels-form-group">
                              <label>Levels Data</label>
                              <div class="levels-entry-shell">
                                  <div class="levels-entry-head">
                                      <span>يمكن إدخال أكثر من سطر لكل موقع</span>
                                      <button type="button" class="mini-add-row-btn" onclick="app.addNewSiteLevelRow()">+ إضافة سطر</button>
                                  </div>
                                  <div class="levels-entry-table-wrap">
                                      <table class="levels-entry-table">
                                          <thead>
                                              <tr>
                                                  <th>Row No</th>
                                                  <th>Design Level</th>
                                                  <th>As Built</th>
                                                  <th>Difference</th>
                                                  <th>Remarks</th>
                                                  <th></th>
                                              </tr>
                                          </thead>
                                          <tbody id="newSiteLevelsBody"></tbody>
                                      </table>
                                  </div>
                              </div>
                          </div>
                          <button type="button" onclick="app.registerNewSite()" class="submit-btn highlight">إضافة الموقع وحفظه</button>
                      </div>
                  </div>
              </div>



          </div>
      </div>

    </div>

    <script src="shared/sites_data.js"></script>
    <script src="shared/dialogs.js"></script>
    <script src="shared/auth.js"></script>
    <script src="shared/coordinates-export.js"></script>
    <script src="shared/app.js"></script>
    <script>
      // Register Service Worker
      if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('sw.js').then(reg => {
          console.log('[PWA] Service Worker registered');
          
          // Check for updates periodically
          setInterval(() => reg.update(), 60 * 1000);
        }).catch((error) => {
          console.warn('[PWA] Service Worker registration skipped:', error.message);
        });

        // Listen for update messages from SW
        navigator.serviceWorker.addEventListener('message', event => {
          if (event.data && event.data.type === 'SW_UPDATED') {
            document.getElementById('updateBanner').classList.add('show');
          }
        });
      }
    </script>
  </body>
</html>
